<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>linkOS QR Generator</title>
 
    <!-- Fontes e Configurações de Aparência -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <meta
      name="theme-color"
      content="#010419"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    
    <!-- Metadados de PWA e Mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="LinkOS" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icon180.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icon32.png" />
    <link rel="manifest" href="manifest.json" />

    <!-- Estilos Externos e Locais -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="screen.css" />
    <link rel="stylesheet" href="footer.css" />
  </head>
  <body>
    <!-- Splash Screen -->
    <div id="splash-screen">
      <div class="splash-content">
        <img
          src="assets/Ativo 1logo.png"
          alt="LinkOS Logo"
          class="splash-logo"
        />
        <div class="splash-loader"></div>
        <p id="splash-phrase" class="splash-phrase">Carregando...</p>
      </div>
    </div>

    <!-- Banner de Instalação PWA -->
    <div id="pwa-install-banner" class="pwa-install-banner is-hidden">
      <img src="assets/icon192.png" alt="LinkOS Icon" />
      <div class="banner-text">
        <strong>Instalar LinkOS</strong>
        <p>Aceda mais rápido e use offline.</p>
      </div>
      <div class="banner-actions">
        <button id="install-pwa-btn" class="textBtn">Instalar</button>
        <button id="close-install-banner" class="textBtn" title="Fechar">
          <i class="fas fa-xmark"></i>
        </button>
      </div>
    </div>

    <section class="container">
      <div class="mainLogo">
        <img src="assets/Ativo 1logo.png" alt="LinkOS Logo" />
        <h1>Link<span>OS</span></h1> <!-- Nome da Marca -->
      </div>

      <!-- Painel de Entrada de Dados -->
      <div class="panel inputPanel">
        <div class="containerElement">
          <!-- Inputs principais que alternam conforme o modo selecionado -->
          <input
            type="text"
            id="text"
            placeholder="Escreva um texto ou cole uma URL"
          />
          <textarea
            id="mainTextarea"
            class="is-hidden"
            placeholder="Escreva seu texto aqui..."
          ></textarea>
          <div id="textareaFooter" class="textarea-footer is-hidden">
            <div id="mainTextareaCounter" class="char-counter">0/150</div>
          </div>
          
          <!-- Grupo de botões de manipulação de texto -->
          <div class="buttonGroup">
            <button id="gr_Gen" title="Gerar QR Code">
              <i class="fas fa-qrcode"></i>
            </button>
            <button id="clear_btn" class="secondaryBtn" title="Limpar Campos">
              <i class="fas fa-eraser"></i>
            </button>
            <button
              id="copy_textarea_btn"
              class="is-hidden"
              title="Copiar Texto"
            >
              <i class="fas fa-copy"></i>
            </button>
            <button
              id="paste_textarea_btn"
              class="is-hidden"
              title="Colar Texto"
            >
              <i class="fas fa-paste"></i>
            </button>
          </div>
        </div>
        
        <!-- Campos específicos para o modo Wi-Fi -->
        <div class="modeFields is-hidden" id="wifiFields">
          <div class="fieldGrid">
            <label class="fieldBlock" for="wifiSsid">
              <span>Nome da rede</span>
              <input
                type="text"
                id="wifiSsid"
                placeholder="Ex.: Minha Rede Wi-Fi"
              />
            </label>
            <label class="fieldBlock" for="wifiPassword">
              <span>Senha</span>
              <input
                type="text"
                id="wifiPassword"
                placeholder="Digite a senha"
              />
            </label>
            <label class="fieldBlock" for="wifiSecurity">
              <span>Seguranca</span>
              <select id="wifiSecurity">
                <option value="WPA" selected>WPA/WPA2</option>
                <option value="WEP">WEP</option>
                <option value="nopass">Sem senha</option>
              </select>
            </label>
            <label class="fieldCheck" for="wifiHidden">
              <input type="checkbox" id="wifiHidden" />
              <span>Rede oculta</span>
            </label>
          </div>
        </div>
        
        <!-- Campos específicos para o modo WhatsApp -->
        <div class="modeFields is-hidden" id="whatsappFields">
          <div class="fieldGrid">
            <label class="fieldBlock" for="waMessage">
              <span>Mensagem (opcional)</span>
              <textarea
                id="waMessage"
                placeholder="Digite a mensagem automatica que a pessoa enviara"
              ></textarea>
              <div id="waMessageCounter" class="char-counter">0/250</div>
            </label>
          </div>
        </div>
      </div>

      <!-- Seletor de Tipo de QR Code -->
      <div class="panel qr_mode">
        <h4>Selecione o tipo do QR code</h4>
        <form action="#" id="modeElement">
          <label for="texto">
            <input type="radio" name="qrType" id="texto" value="text" checked />
            <span title="Texto"><i class="fas fa-font"></i></span>
          </label>
          <label for="linkUrl">
            <input type="radio" name="qrType" id="linkUrl" value="url" />
            <span title="URL"><i class="fas fa-link"></i></span>
          </label>
          <label for="whatsapp">
            <input type="radio" name="qrType" id="whatsapp" value="whatsapp" />
            <span title="WhatsApp"><i class="fab fa-whatsapp"></i></span>
          </label>
          <label for="wifi">
            <input type="radio" name="qrType" id="wifi" value="wifi" />
            <span title="Wi-Fi"><i class="fas fa-wifi"></i></span>
          </label>
        </form>
      </div>

      <!-- Visualização e Configuração Visual do QR Code -->
      <div class="panel previewPanel">
        <p id="statusMessage" aria-live="polite">
          Escolha um tipo, digite o conteudo e gere o QR code.
        </p>
        
        <!-- Onde o QR Code será renderizado -->
        <div id="qrcode" aria-label="Previa do QR code"></div> 

        <h4>Selecione o tema do QR code</h4>
        <form action="#" id="themeElement">
          <label for="themeClaro">
            <input
              type="radio"
              name="qrTheme"
              id="themeClaro"
              value="claro"
              checked
            />
            <span>Claro</span>
          </label>
          <label for="themeEscuro">
            <input
              type="radio"
              name="qrTheme"
              id="themeEscuro"
              value="escuro"
            />
            <span>Escuro</span>
          </label>
        </form>

        <!-- Botões de Download e Partilha -->
        <div class="actionButtons">
          <button class="downloadBtn" type="button" disabled title="Download">
            <i class="fas fa-download"></i>
          </button>
          <button
            id="copy_btn"
            class="shareBtn"
            type="button"
            disabled
            title="Copiar"
          >
            <i class="fas fa-copy"></i>
          </button>
          <button
            id="share_btn"
            class="shareBtn"
            type="button"
            disabled
            title="Partilhar"
          >
            <i class="fas fa-share-nodes"></i>
          </button>
        </div>
      </div>

      <!-- Painel do Histórico de Geração -->
      <div class="panel historyPanel">
        <div class="historyHeader">
          <h4>Histórico Recente</h4>
          <button id="clear_history" class="textBtn" title="Limpar Histórico">
            <i class="fas fa-trash-can"></i>
          </button>
        </div>
        <div id="historyList" class="historyList">
          <p class="emptyHistory">Nenhum QR code gerado ainda.</p>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="footerLogo">Link<span>OS</span></div>
      <div class="socialLinks">
        <a
          href="https://github.com"
          class="socialIcon"
          aria-label="GitHub"
          target="_blank"
          rel="noopener"
        >
          <svg viewBox="0 0 24 24">
            <path
              d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
            />
          </svg>
        </a>
        <a
          href="https://instagram.com"
          class="socialIcon"
          aria-label="Instagram"
          target="_blank"
          rel="noopener"
        >
          <svg viewBox="0 0 24 24">
            <path
              d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"
            />
          </svg>
        </a>
      </div>
      <p class="copyrightText">
        &copy; 2026 LinkOS. Todos os direitos reservados.
      </p>
    </footer>

    <!-- Bibliotecas e Scripts -->
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script src="script.js" defer></script>
  </body>
</html>
