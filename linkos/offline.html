<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - LinkOS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .offline-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 400px;
        }
        i { font-size: 4rem; color: var(--color7); margin-bottom: 10px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="offline-container">
        <i class="fas fa-plane-slash"></i>
        <h1>Você está offline</h1>
        <p>Parece que não tem ligação à internet e esta página ainda não foi guardada para uso offline.</p>
        <a href="./" class="containerElement button" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center;">Tentar Novamente</a>
    </div>
</body>
</html>
